<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EX1: Conversion température</title>
</head>
<body>
    

    <script>
        function degreC(){
            let f = prompt("Une température en Fahrenheit :");
            let tempC=(5/9)*(f-32);
            alert("cette température équivaut à " + tempC + " degrés Celsius." );

           
        }

        degreC();


    </script>
</body>
</html>
