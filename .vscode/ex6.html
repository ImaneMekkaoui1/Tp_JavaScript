<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
let n = parseInt(prompt("Donnez n :"));

let u0 = 0;
let u1 = 1;
let u;

if (n === 0) u = 0;
else if (n === 1) u = 1;
else {
    for (let i = 2; i <= n; i++) {
        u = u0 + u1;
        u0 = u1;
        u1 = u;
    }
}

document.write("Le terme " + n + " de Fibonacci = " + u);


    </script>
    
</body>
</html>
